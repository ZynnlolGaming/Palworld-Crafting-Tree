<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palworld Crafting Blueprint Tree</title>
    <style>
        :root { --bg-main: #181412; --bg-node: #2c2520; --border-node: #4a3f35; --text-main: #e2dcd5; --text-muted: #a09387; --accent: #eab308; --line-color: #5a4d41; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .controls { background: var(--bg-node); border: 2px solid var(--border-node); padding: 1rem 2rem; display: flex; gap: 2rem; margin-bottom: 2rem; border-radius: 6px; }
        .input-wrapper { display: flex; align-items: center; background: #181412; border: 2px solid var(--border-node); padding: 0.4rem; border-radius: 4px; }
        input { background: transparent; border: none; color: white; padding: 0.5rem; font-weight: bold; outline: none; }
        .clear-btn { cursor: pointer; color: #7f1d1d; font-weight: bold; padding: 0 0.5rem; }
        
        .tree-viewport { width: 100%; display: flex; justify-content: center; }
        .tree-branch { display: flex; flex-direction: column; align-items: center; position: relative; padding: 1rem 0.5rem 0; }
        .tree-branch::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 1rem; background: var(--line-color); }
        .craft-node { background: var(--bg-node); border: 2px solid var(--border-node); padding: 0.5rem; display: flex; align-items: center; gap: 0.5rem; border-radius: 4px; }
        
        .children-container { display: flex; justify-content: center; align-items: flex-start; position: relative; border-top: 2px solid var(--line-color); margin-top: 1rem; }
        .total-cost-summary { margin-top: 3rem; border-top: 2px solid var(--border-node); padding-top: 1rem; width: 100%; text-align: center; }
        .cost-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; }
        .cost-badge { background: var(--bg-node); border: 2px solid var(--border-node); padding: 0.5rem; border-radius: 4px; display: flex; align-items: center; gap: 0.5rem; }
    </style>
</head>
<body>
    <div class="controls">
        <div><label>Item:</label><div class="input-wrapper"><input type="text" id="item-search" value="AI Core"><span class="clear-btn" onclick="clearInput('item-search')">X</span></div></div>
        <div><label>Quantity:</label><div class="input-wrapper"><input type="number" id="item-qty" value="20" min="1" oninput="calculate()"><span class="clear-btn" onclick="clearInput('item-qty')">X</span></div></div>
    </div>
    <div id="tree-canvas" class="tree-viewport"></div>
    <div class="total-cost-summary"><h3>Total Raw Base Cost</h3><div id="summary-row" class="cost-row"></div></div>

<script>
    const itemDataMap = { "AI Core": "Material_AIcore", "Computer": "Material_Computer", "Soralite Ingot": "Material_SkyislandIngot", "Thermal Core": "Material_Thermal_Core", "Ancient Civilization Core": "Material_BossTrophy_2", "Circuit Board": "Material_MachineParts2", "Bio Battery": "Material_BioBattery", "Polymer": "Material_Polymer", "Soralite Ore": "Material_SkyIslandOre", "Paldium Fragment": "Material_Pal_crystal_S", "Flame Organ": "Material_FireOrgan", "Refined Ingot": "Material_SteelIngot", "Pal Fluids": "Material_PalFluid", "Pure Quartz": "Material_Quartz", "Electric Organ": "Material_ElectricOrgan", "High Quality Pal Oil": "Material_PalOil" };
    const recipes = {
        "AI Core": { materials: [{ name: "Computer", qty: 5 }, { name: "Soralite Ingot", qty: 10 }, { name: "Thermal Core", qty: 2 }, { name: "Ancient Civilization Core", qty: 1 }] },
        "Computer": { materials: [{ name: "Circuit Board", qty: 2 }, { name: "Bio Battery", qty: 2 }, { name: "Polymer", qty: 1 }] },
        "Soralite Ingot": { materials: [{ name: "Soralite Ore", qty: 2 }, { name: "Paldium Fragment", qty: 1 }] },
        "Thermal Core": { materials: [{ name: "Flame Organ", qty: 5 }, { name: "Refined Ingot", qty: 3 }, { name: "Pal Fluids", qty: 1 }] },
        "Circuit Board": { materials: [{ name: "Pure Quartz", qty: 4 }, { name: "Polymer", qty: 2 }] },
        "Bio Battery": { materials: [{ name: "Electric Organ", qty: 5 }, { name: "High Quality Pal Oil", qty: 3 }] }
    };

    let baseTotals = {};

    function getIcon(name) {
        const id = itemDataMap[name] || name.replace(/\s+/g, '');
        return `<img src="https://palworld.gg/_ipx/q_80&s_52x52/images/items/T_itemicon_${id}.png" style="width:32px; height:32px;" onerror="this.style.display='none'">`;
    }

    function clearInput(id) {
        if(id === 'item-qty') document.getElementById(id).value = 1;
        else document.getElementById(id).value = '';
        calculate();
    }

    function calculate() {
        const qty = parseInt(document.getElementById('item-qty').value) || 1;
        const root = document.getElementById('item-search').value;
        const canvas = document.getElementById('tree-canvas');
        const summary = document.getElementById('summary-row');
        canvas.innerHTML = ''; summary.innerHTML = ''; baseTotals = {};
        
        if(recipes[root]) {
            canvas.appendChild(render(root, qty));
            Object.keys(baseTotals).forEach(name => {
                summary.innerHTML += `<div class="cost-badge">${getIcon(name)}<span>${name}[x${baseTotals[name]}]</span></div>`;
            });
        }
    }

    function render(name, qty) {
        const branch = document.createElement('div');
        branch.className = 'tree-branch';
        branch.innerHTML = `<div class="craft-node">${getIcon(name)}<span class="node-name">${name}[x${qty}]</span></div>`;
        if(recipes[name]) {
            const children = document.createElement('div');
            children.className = 'children-container';
            recipes[name].materials.forEach(m => children.appendChild(render(m.name, m.qty * qty)));
            branch.appendChild(children);
        } else {
            baseTotals[name] = (baseTotals[name] || 0) + qty;
        }
        return branch;
    }

    document.getElementById('item-search').oninput = calculate;
    calculate();
</script>
</body>
</html>
